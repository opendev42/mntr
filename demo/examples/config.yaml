# Demo config: simulates an infrastructure monitoring dashboard
#
# Run with:
#   PYTHONPATH=demo python -m mntr.publisher.interval_publisher \
#     -c demo/examples/config.yaml --server http://localhost:5100 \
#     --name client0 --passphrase demo/passphrases/client0.txt

system-logs: &LOGS
  class: examples.example_publishers.SystemLogPublisher
  params:
    interval: 3

service-status: &STATUS
  class: examples.example_publishers.ServiceStatusPublisher
  params:
    interval: 4

request-latency: &LATENCY
  class: examples.example_publishers.RequestLatencyPublisher
  params:
    interval: 2

error-rate:
  class: examples.example_publishers.ErrorRatePublisher
  params:
    interval: 2.5

traffic-by-endpoint:
  class: examples.example_publishers.TrafficByEndpointPublisher
  params:
    interval: 3

resource-usage:
  class: examples.example_publishers.ResourceUsagePublisher
  params:
    interval: 3

status-codes:
  class: examples.example_publishers.StatusCodeDistPublisher
  params:
    interval: 4

latency-distribution:
  class: examples.example_publishers.LatencyDistributionPublisher
  params:
    interval: 5

request-log:
  class: examples.example_publishers.RequestLogPublisher
  params:
    interval: 2

deploy-status: &DEPLOY
  class: examples.example_publishers.DeployStatusPublisher
  params:
    interval: 5

alert-error: &ALERT_ERROR
  class: examples.example_publishers.AlertPublisher
  params:
    alert_severity: error

alert-warning:
  class: examples.example_publishers.AlertPublisher
  params:
    alert_severity: warning

alert-info:
  class: examples.example_publishers.AlertPublisher
  params:
    alert_severity: info

alert-success:
  class: examples.example_publishers.AlertPublisher
  params:
    alert_severity: success

overview:
  class: examples.example_publishers.DashboardPublisher
  params:
    monitors:
      logs: *LOGS
      services: *STATUS
      latency: *LATENCY
      deploy: *DEPLOY
      alerts: *ALERT_ERROR
